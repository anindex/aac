name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.11
      - name: Install
        run: |
          uv venv -p 3.11
          uv pip install -e ".[dev]"
      - name: Ruff
        run: .venv/bin/ruff check src/ scripts/ tests/ examples/
      - name: mypy
        run: .venv/bin/mypy src/aac/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install
        run: |
          uv venv -p ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
      - name: Test
        run: .venv/bin/pytest tests/ -x -q --tb=short -m "not slow and not gpu and not network"
