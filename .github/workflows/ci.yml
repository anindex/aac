name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev,experiments]"
      - name: Ruff
        run: ruff check src/ scripts/ tests/ examples/
      - name: mypy
        run: mypy src/aac/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          pip install -e ".[dev,experiments]"
          python -c "import aac.baselines; print('aac.baselines OK')"
          python -c "import experiments; print('experiments OK')"
      - name: Test
        run: pytest tests/ -x -q --tb=short -m "not slow and not gpu and not network"
