name: aac
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - setuptools>=75.0
  - scipy>=1.14
  - networkx>=3.2
  - osmnx>=2.1.0
  - pytest>=9.0
  - hypothesis>=6.0
  - ruff>=0.9
  - mypy>=1.10
  - pytest-benchmark>=5.0
  # ---------- Experiment ----------
  - hydra-core>=1.3.2
  - omegaconf>=2.3
  - tensorboard>=2.14
  - matplotlib>=3.8
  - seaborn>=0.13
  - pandas>=2.0
  - scikit-learn>=1.5
  - pillow>=9.0
  - pip:
      # PyTorch with CUDA -- use --extra-index-url so PyPI is still available
      # for other dependencies. Adjust cu130 for your CUDA version.
      - --extra-index-url https://download.pytorch.org/whl/cu130
      - torch>=2.11.0
      # Install the project itself in editable mode
      - -e .
